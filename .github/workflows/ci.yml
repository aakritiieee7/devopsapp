name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Prisma Generate
      run: npx prisma generate
      
    - name: Run Unit Tests
      run: npm test
      
    - name: Lint
      run: npm run lint
      
    - name: Build Next.js
      run: npm run build

  dockerize:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker Image
      run: docker build -t devopsapp:${{ github.sha }} .

  release:
    needs: dockerize
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run Secure Release Mapping
      run: |
        chmod +x ./scripts/release.sh
        ./scripts/release.sh

  deploy:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to Specialized Cloud
      run: |
        echo "🚀 [Stage 6] Initiating Zero-Downtime Revalidation Deployment..."
        echo "🌐 Target: Industrial Governance Cluster"
        # Simulated deployment command
        echo "npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}"
